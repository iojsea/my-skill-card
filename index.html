<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的技能卡片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0d1117, #161b22);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #30363d;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 { color: #e6edf3; font-size: 24px; margin-bottom: 8px; }
        .title { color: #8b949e; font-size: 14px; margin-bottom: 24px; }
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .skill-tag {
            background: #1f6feb;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .links {
            margin-top: 28px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .links a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .links a:hover { color: #79c0ff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🐱</div>
        <h1>Hello，我是 iojsea</h1>
        <p class="title">正在学习 GitHub · 这是我的第一个项目</p>
        <div class="skills">
            <span class="skill-tag">HTML</span>
            <span class="skill-tag">CSS</span>
            <span class="skill-tag">Git</span>
            <span class="skill-tag">GitHub</span>
        </div>
        <div class="links">
            <a href="https://github.com/iojsea" target="_blank">GitHub 主页</a>
            <a href="README.md">项目说明</a>
        </div>
    </div>
</div>
</body>
</html>
